<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoogaBook Staff</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>
body{font-family:Arial,sans-serif;background:#f5f7fb;margin:0}
.container{max-width:760px;margin:auto;padding:15px}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:15px;box-shadow:0 4px 10px rgba(0,0,0,.08)}
input,button{width:100%;box-sizing:border-box;padding:10px;margin:5px 0;border-radius:8px;font-size:15px}
input{border:1px solid #ccc}
button{border:none;background:#4CAF50;color:white;cursor:pointer}
.secondary{background:#2196F3}
.danger{background:#f44336}
.orange{background:#ff9800}
.grey{background:#607d8b}
.hidden{display:none!important}
.small{font-size:12px;color:#666}
.table-wrap{overflow-x:auto}
.table{width:100%;border-collapse:collapse;margin-top:10px}
.table th,.table td{border-bottom:1px solid #ddd;padding:8px;text-align:left;font-size:14px}
.msg{padding:10px;border-radius:8px;margin-top:8px}
.ok{background:#e8f5e9;color:#2e7d32}
.bad{background:#ffebee;color:#c62828}
#reader{margin-top:10px;border-radius:10px;overflow:hidden}
</style>
</head>

<body>
<div class="container">

<!-- LOGIN -->
<div id="loginPage" class="card">
<h2>🔐 Staff Login</h2>
<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<div id="loginMsg"></div>
</div>

<!-- MAIN STAFF PAGE -->
<div id="staffPage" class="card hidden">

<h2>📚 Book Management</h2>

<input id="barcode" placeholder="Scan / Enter Barcode">

<button class="secondary" onclick="startScanner()">📷 Start Camera Scanner</button>
<button class="grey" onclick="stopScanner()">Stop Scanner</button>

<!-- ✅ SCANNER MOVED HERE -->
<div id="reader"></div>

<input id="bookTitle" placeholder="Book Title">
<input id="customer" placeholder="Customer Name">
<input id="customerPhone" placeholder="Phone">

<button onclick="loanBook()">Loan</button>
<button class="secondary" onclick="returnBook()">Return</button>

<div id="staffMsg"></div>

<button onclick="logout()">Logout</button>

</div>

</div>

<script>
let scanner=null;
let running=false;
let locked=false;

function m(id,text,ok=true){
 document.getElementById(id).innerHTML='<div class="'+(ok?'msg ok':'msg bad')+'">'+text+'</div>';
}

function beep(){
 try{
  let ctx=new (window.AudioContext||window.webkitAudioContext)();
  let osc=ctx.createOscillator();
  let gain=ctx.createGain();
  osc.frequency.value=880;
  gain.gain.value=0.2;
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime+0.15);
 }catch(e){}
}

async function reset(){
 try{if(scanner&&running)await scanner.stop();}catch(e){}
 try{if(scanner)await scanner.clear();}catch(e){}
 scanner=null;
 running=false;
 locked=false;
 reader.innerHTML="";
}

async function startScanner(){
 try{
  if(running)return;

  await reset();

  if(!window.isSecureContext){
   m("staffMsg","Use GitHub https link",false);
   return;
  }

  scanner=new Html5Qrcode("reader");

  let cams=await Html5Qrcode.getCameras();
  if(!cams.length){
   m("staffMsg","No camera",false);
   return;
  }

  let cam=cams.find(c=>/back|rear/i.test(c.label))||cams[0];

  running=true;
  m("staffMsg","Starting camera");

  await scanner.start(
   cam.id,
   {fps:10,qrbox:250},
   async(txt)=>{
    if(locked)return;
    locked=true;

    barcode.value=txt;
    beep();
    m("staffMsg","Scanned: "+txt);

    setTimeout(reset,300);
   }
  );

 }catch(e){
  await reset();
  m("staffMsg","Camera blocked",false);
 }
}

async function stopScanner(){
 await reset();
 m("staffMsg","Stopped");
}

/* dummy logic - keep your original backend calls */
function login(){
 loginPage.classList.add("hidden");
 staffPage.classList.remove("hidden");
}

function logout(){
 staffPage.classList.add("hidden");
 loginPage.classList.remove("hidden");
}

function loanBook(){m("staffMsg","Loan recorded");}
function returnBook(){m("staffMsg","Return recorded");}
</script>

</body>
</html>
