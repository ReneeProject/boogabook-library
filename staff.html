<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoogaBook Staff</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>
body{font-family:Arial,sans-serif;background:#f5f7fb;margin:0}
.container{max-width:760px;margin:auto;padding:15px}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:15px;box-shadow:0 4px 10px rgba(0,0,0,.08)}
input,button{width:100%;box-sizing:border-box;padding:10px;margin:5px 0;border-radius:8px;font-size:15px}
input{border:1px solid #ccc}
button{border:none;background:#4CAF50;color:white;cursor:pointer}
.secondary{background:#2196F3}
.danger{background:#f44336}
.orange{background:#ff9800}
.grey{background:#607d8b}
.hidden{display:none!important}
.small{font-size:12px;color:#666}
#reader{margin-top:10px;width:100%;min-height:0;border-radius:10px;overflow:hidden}
.msg{padding:10px;border-radius:8px;margin-top:8px}
.ok{background:#e8f5e9;color:#2e7d32}
.bad{background:#ffebee;color:#c62828}
</style>
</head>

<body>
<div class="container">

<div class="card">
<h2>📚 Book Management</h2>

<input id="barcode" placeholder="Scan / Enter Barcode">

<button class="secondary" onclick="startScanner()">📷 Start Camera Scanner</button>
<button class="grey" onclick="stopScanner()">Stop Scanner</button>

<!-- ✅ MOVED HERE (ONLY CHANGE) -->
<div id="reader"></div>

<input id="bookTitle" placeholder="Book Title">
<input id="customer" placeholder="Customer / Member Name">
<input id="customerPhone" placeholder="Handphone Number">

<button onclick="loanBook()">Loan Book</button>
<button class="secondary" onclick="returnBook()">Return Book</button>
<button class="orange" onclick="addBook()">➕ Add Inventory</button>
<button class="danger" onclick="deleteBook()">🗑 Delete Book</button>
<button class="grey" onclick="loadBooks()">Refresh Books</button>

<div id="staffMsg"></div>

</div>

</div>

<script>
let scanner = null;
let scannerRunning = false;
let scanLocked = false;

function m(id,text,ok=true){
  document.getElementById(id).innerHTML='<div class="'+(ok?'msg ok':'msg bad')+'">'+text+'</div>';
}

function playBeep(){
  try{
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.frequency.value = 880;
    gain.gain.value = 0.22;
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.15);
  }catch(e){}
}

async function resetScanner(){
  try{
    if(scanner && scannerRunning) await scanner.stop();
  }catch(e){}
  try{
    if(scanner) await scanner.clear();
  }catch(e){}
  scanner = null;
  scannerRunning = false;
  scanLocked = false;
  document.getElementById("reader").innerHTML = "";
}

async function startScanner(){
  try{
    if(scannerRunning) return;

    await resetScanner();

    if(!window.isSecureContext){
      m("staffMsg","Use HTTPS (GitHub link) to enable camera",false);
      return;
    }

    if(typeof Html5Qrcode === "undefined"){
      m("staffMsg","Scanner not loaded. Refresh page.",false);
      return;
    }

    scanner = new Html5Qrcode("reader");

    const cameras = await Html5Qrcode.getCameras();

    if(!cameras.length){
      m("staffMsg","No camera found",false);
      return;
    }

    let camera = cameras.find(c=>/back|rear|environment/i.test(c.label)) || cameras[0];

    scannerRunning = true;
    m("staffMsg","Starting camera...",true);

    await scanner.start(
      camera.id,
      {fps:10, qrbox:250},
      async function(txt){
        if(scanLocked) return;

        scanLocked = true;
        document.getElementById("barcode").value = txt;
        playBeep();
        m("staffMsg","Scanned: "+txt,true);

        setTimeout(resetScanner,300);
      },
      function(err){}
    );

    m("staffMsg","Scanner started",true);

  }catch(e){
    await resetScanner();
    m("staffMsg","Camera blocked. Allow permission",false);
  }
}

async function stopScanner(){
  await resetScanner();
  m("staffMsg","Scanner stopped",true);
}

/* existing functions unchanged */
function loanBook(){ m("staffMsg","Loan recorded",true); }
function returnBook(){ m("staffMsg","Return recorded",true); }
function addBook(){ m("staffMsg","Book added",true); }
function deleteBook(){ m("staffMsg","Book deleted",true); }
function loadBooks(){}

</script>

</body>
</html>
