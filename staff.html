<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoogaBook Staff</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>
body{font-family:Arial;background:#f5f7fb;margin:0}
.container{max-width:700px;margin:auto;padding:15px}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:15px;box-shadow:0 4px 10px rgba(0,0,0,.08)}
input,button{width:100%;padding:10px;margin:5px 0;border-radius:8px;font-size:15px}
input{border:1px solid #ccc}
button{border:none;background:#4CAF50;color:white}
.secondary{background:#2196F3}
.grey{background:#607d8b}
.orange{background:#ff9800}
.danger{background:#f44336}
.hidden{display:none}
#reader{margin-top:10px;border-radius:10px;overflow:hidden}
.msg{padding:10px;border-radius:8px;margin-top:8px}
.ok{background:#e8f5e9;color:#2e7d32}
.bad{background:#ffebee;color:#c62828}
</style>
</head>

<body>
<div class="container">

<div class="card">
<h2>📚 Staff Panel</h2>

<input id="barcode" placeholder="Scan / Enter Barcode">

<button class="secondary" onclick="startScanner()">📷 Start Camera Scanner</button>
<button class="grey" onclick="stopScanner()">Stop Scanner</button>

<!-- ✅ SCANNER NOW HERE -->
<div id="reader"></div>

<input id="bookTitle" placeholder="Book Title">
<input id="customer" placeholder="Customer Name">
<input id="phone" placeholder="Handphone Number">

<button onclick="loan()">Loan Book</button>
<button class="secondary" onclick="returnBook()">Return Book</button>

<div id="msg"></div>
</div>

</div>

<script>
let scanner = null;
let running = false;
let locked = false;

function show(msg, ok=true){
 document.getElementById("msg").innerHTML =
 '<div class="'+(ok?'msg ok':'msg bad')+'">'+msg+'</div>';
}

function beep(){
 try{
  let ctx=new (window.AudioContext||window.webkitAudioContext)();
  let osc=ctx.createOscillator();
  let gain=ctx.createGain();
  osc.frequency.value=880;
  gain.gain.value=0.2;
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime+0.15);
 }catch(e){}
}

async function reset(){
 try{ if(scanner&&running) await scanner.stop(); }catch(e){}
 try{ if(scanner) await scanner.clear(); }catch(e){}
 scanner=null;
 running=false;
 locked=false;
 document.getElementById("reader").innerHTML="";
}

async function startScanner(){
 try{
  if(running) return;

  await reset();

  if(!window.isSecureContext){
    show("Use HTTPS (GitHub link) to enable camera",false);
    return;
  }

  scanner=new Html5Qrcode("reader");

  let cams=await Html5Qrcode.getCameras();
  if(!cams.length){
    show("No camera found",false);
    return;
  }

  let cam=cams.find(c=>/back|rear/i.test(c.label))||cams[0];

  running=true;
  show("Starting camera...");

  await scanner.start(
    cam.id,
    {fps:10,qrbox:250},
    async(txt)=>{
      if(locked) return;
      locked=true;

      document.getElementById("barcode").value=txt;
      beep();
      show("Scanned: "+txt);

      setTimeout(reset,300);
    }
  );

 }catch(e){
  await reset();
  show("Camera blocked. Allow permission",false);
 }
}

async function stopScanner(){
 await reset();
 show("Scanner stopped");
}

/* dummy functions */
function loan(){ show("Loan recorded"); }
function returnBook(){ show("Return recorded"); }

</script>
</body>
</html>
