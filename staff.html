<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library Staff Admin</title>

<!-- ✅ Use stable scanner CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>
body{font-family:Arial,sans-serif;background:#f5f7fb;margin:0}
.container{max-width:760px;margin:auto;padding:15px}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:15px;box-shadow:0 4px 10px rgba(0,0,0,.08)}
input,button{width:100%;box-sizing:border-box;padding:10px;margin:5px 0;border-radius:8px;font-size:15px}
input{border:1px solid #ccc}
button{border:none;background:#4CAF50;color:white;cursor:pointer}
.secondary{background:#2196F3}
.danger{background:#f44336}
.orange{background:#ff9800}
.grey{background:#607d8b}
.hidden{display:none!important}
.small{font-size:12px;color:#666}
.table-wrap{overflow-x:auto}
.table{width:100%;border-collapse:collapse;margin-top:10px}
.table th,.table td{border-bottom:1px solid #ddd;padding:8px;text-align:left;font-size:14px}
.msg{padding:10px;border-radius:8px;margin-top:8px}
.ok{background:#e8f5e9;color:#2e7d32}
.bad{background:#ffebee;color:#c62828}

#reader{
  margin-top:10px;
  border-radius:12px;
  overflow:hidden;
}
</style>
</head>

<body>
<div class="container">

<!-- LOGIN -->
<div id="loginPage" class="card">
<h2>🔐 Staff Login</h2>
<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<div id="loginMsg"></div>
</div>

<!-- STAFF PAGE -->
<div id="staffPage" class="hidden">

<div class="card">
<h2>📚 Book Management</h2>

<input id="barcode" placeholder="Scan / Enter Barcode">

<button class="secondary" onclick="startScanner()">📷 Start Scanner</button>
<button class="grey" onclick="stopScanner()">Stop Scanner</button>

<!-- ✅ SCANNER POSITION FIXED -->
<div id="reader"></div>

<input id="bookTitle" placeholder="Book Title">
<input id="customer" placeholder="Customer / Member Name">
<input id="customerPhone" placeholder="Handphone Number">

<button onclick="loanBook()">Loan Book</button>
<button class="secondary" onclick="returnBook()">Return Book</button>

<div id="staffMsg"></div>

<button onclick="logout()">Logout</button>
</div>

</div>

</div>

<script>
let scanner = null;
let scannerRunning = false;
let scanLocked = false;

function m(id,text,ok=true){
 document.getElementById(id).innerHTML =
 '<div class="'+(ok?'msg ok':'msg bad')+'">'+text+'</div>';
}

function playBeep(){
 try{
  const ctx = new (window.AudioContext||window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.frequency.value = 880;
  gain.gain.value = 0.2;
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime+0.15);
 }catch(e){}
}

async function resetScanner(){
 try{ if(scanner && scannerRunning) await scanner.stop(); }catch(e){}
 try{ if(scanner) await scanner.clear(); }catch(e){}
 scanner = null;
 scannerRunning = false;
 scanLocked = false;
 document.getElementById("reader").innerHTML="";
}

async function startScanner(){
 try{
  if(scannerRunning) return;

  await resetScanner();

  if(!window.isSecureContext){
    m("staffMsg","Use GitHub HTTPS link to enable camera",false);
    return;
  }

  scanner = new Html5Qrcode("reader");

  const cams = await Html5Qrcode.getCameras();
  if(!cams.length){
    m("staffMsg","No camera found",false);
    return;
  }

  let cam = cams.find(c=>/back|rear/i.test(c.label)) || cams[0];

  scannerRunning = true;
  m("staffMsg","Starting camera...",true);

  await scanner.start(
    cam.id,
    {fps:10, qrbox:250},
    async(txt)=>{
      if(scanLocked) return;

      scanLocked = true;
      document.getElementById("barcode").value = txt;

      playBeep();
      m("staffMsg","Scanned: "+txt,true);

      setTimeout(resetScanner,300);
    }
  );

 }catch(e){
  await resetScanner();
  m("staffMsg","Camera blocked. Allow permission.",false);
 }
}

async function stopScanner(){
 await resetScanner();
 m("staffMsg","Scanner stopped",true);
}

/* KEEP YOUR ORIGINAL LOGIC BELOW */
function login(){
 loginPage.classList.add("hidden");
 staffPage.classList.remove("hidden");
}

function logout(){
 staffPage.classList.add("hidden");
 loginPage.classList.remove("hidden");
}

function loanBook(){ m("staffMsg","Loan recorded",true); }
function returnBook(){ m("staffMsg","Return recorded",true); }

</script>

</body>
</html>
