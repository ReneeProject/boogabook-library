<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoogaBook Members Library</title>

<!-- STABLE CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>
body{font-family:Arial;background:#f5f7fb;margin:0}
.container{max-width:520px;margin:auto;padding:15px}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:15px;box-shadow:0 4px 10px rgba(0,0,0,.08)}
input,button{width:100%;padding:12px;margin:6px 0;border-radius:8px;font-size:16px}
input{border:1px solid #ccc}
button{border:none;background:#4CAF50;color:white}
.secondary{background:#2196F3}
.grey{background:#607d8b}
.hidden{display:none}
.notice{background:#fff7ed;color:#9a3412;border:1px solid #fed7aa;padding:12px;border-radius:10px;margin:10px 0}
.error{background:#ffebee;color:#c62828;padding:12px;border-radius:10px}
.success{background:#e8f5e9;color:#2e7d32;padding:12px;border-radius:10px}
.table{width:100%;border-collapse:collapse;margin-top:10px}
.table td,.table th{border-bottom:1px solid #ddd;padding:8px}
.due{color:#f97316;font-weight:bold}
.over{color:#dc2626;font-weight:bold}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>📚 Members Library</h2>
</div>

<div class="card">
<input id="name" placeholder="Member Name">
<input id="phone" placeholder="Handphone Number">
<button onclick="startMember()">Start</button>
<div id="startMsg"></div>
</div>

<div id="main" class="card hidden">
<h3>Borrow / Return</h3>

<div class="notice">
Max 2 books. Return same day or it becomes overdue.
</div>

<input id="barcode" placeholder="Scan Book Barcode">

<button class="secondary" onclick="startScanner()">📷 Start Scanner</button>
<button class="grey" onclick="stopScanner()">Stop Scanner</button>

<button onclick="borrow()">Borrow</button>
<button class="secondary" onclick="returnBook()">Return</button>

<div id="reader"></div>
<div id="msg"></div>
</div>

<div id="listCard" class="card hidden">
<h3>My Books</h3>
<table class="table">
<thead><tr><th>Book</th><th>Title</th><th>Status</th></tr></thead>
<tbody id="list"></tbody>
</table>
</div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbx1r8eOskw8-c0l1awSKuIfYYLaEh4oSK36_7PNlgEG4qHDxMRLpN0aEtvBjmZAZpH-Iw/exec";

let user=null;
let scanner=null;

function msg(id,text,ok){
document.getElementById(id).innerHTML=
'<div class="'+(ok?'success':'error')+'">'+text+'</div>';
}

async function startMember(){
let n=name.value,p=phone.value;
if(!n||!p){msg("startMsg","Enter details",0);return;}

let r=await fetch(API_URL+"?mode=membercheck&name="+n+"&phone="+p);
let d=await r.json();

if(!d.success||!d.active){msg("startMsg","Not active",0);return;}

user={n,p};
main.classList.remove("hidden");
listCard.classList.remove("hidden");
msg("startMsg","OK",1);
load();
}

async function borrow(){
let b=barcode.value;
if(!b)return;

let r=await fetch(API_URL,{
method:"POST",
body:JSON.stringify({action:"BORROW",barcode:b,name:user.n,phone:user.p})
});
let d=await r.json();
msg("msg",d.message,d.success);
load();
}

async function returnBook(){
let b=barcode.value;
if(!b)return;

let r=await fetch(API_URL,{
method:"POST",
body:JSON.stringify({action:"CUSTOMER_RETURN",barcode:b,name:user.n,phone:user.p})
});
let d=await r.json();
msg("msg",d.message,d.success);
load();
}

async function load(){
let r=await fetch(API_URL+"?mode=books");
let d=await r.json();
let html="";

d.books.forEach(x=>{
if(x["Borrower Name"]==user.n && x["Phone"]==user.p && x.Status=="OUT"){
let overdue = x["Overdue Days"]>0
? `<span class="over">${x["Overdue Days"]} days overdue</span>`
: `<span class="due">Due today</span>`;
html+=`<tr><td>${x.Barcode}</td><td>${x.Title}</td><td>${overdue}</td></tr>`;
}
});

list.innerHTML=html||"<tr><td colspan=3>No books</td></tr>";
}

async function startScanner(){
if(!window.isSecureContext){
msg("msg","Use HTTPS link",0);
return;
}

try{
scanner=new Html5Qrcode("reader");

const cams=await Html5Qrcode.getCameras();
if(!cams.length){msg("msg","No camera",0);return;}

await scanner.start(
cams[0].id,
{fps:10,qrbox:250},
txt=>{
barcode.value=txt;
msg("msg","Scanned: "+txt,1);
},
()=>{}
);

msg("msg","Scanner started",1);

}catch(e){
msg("msg","Camera blocked. Allow permission.",0);
}
}

async function stopScanner(){
if(scanner){
await scanner.stop();
scanner.clear();
msg("msg","Stopped",1);
}
}
</script>

</body>
</html>
